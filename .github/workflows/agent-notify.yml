name: Agent Notify (reusable)

# Reusable notify workflow: on a pipeline result (typically failure), POST the
# result to the OpenClaw Gateway hook endpoint. The gateway routes it via the
# `ci-result` mapping to the PL agent (nvidia/nemotron-3-super-120b-a12b), which
# summarizes the root cause and reports via Telegram. The agent observes/reports
# only — it is NOT in the deploy path.
#
# IMPORTANT: this job runs on a SELF-HOSTED runner on the OpenClaw host, so it can
# reach the loopback-only gateway at http://127.0.0.1:18789. The gateway is NOT
# exposed to the internet; auth is a static Bearer token (hooks.token). No HMAC.

on:
  workflow_call:
    inputs:
      status:
        description: "Pipeline result: success | failure"
        required: true
        type: string
      stage:
        description: "Which stage produced this result (ci | deploy)"
        required: false
        type: string
        default: "ci"
    secrets:
      OPENCLAW_GATEWAY_HOOK_TOKEN:
        description: "Bearer token for the OpenClaw gateway hooks endpoint (hooks.token)"
        required: true

permissions:
  contents: read
  actions: read

jobs:
  notify:
    # Must run on the OpenClaw host to reach the loopback-only gateway.
    runs-on: self-hosted
    steps:
      - name: POST result to OpenClaw gateway hook
        run: |
          payload="$(jq -nc \
            --arg repo          "$GITHUB_REPOSITORY" \
            --arg workflow_name "$GITHUB_WORKFLOW" \
            --arg run_id        "$GITHUB_RUN_ID" \
            --arg run_url       "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg ref           "$GITHUB_REF_NAME" \
            --arg sha           "$GITHUB_SHA" \
            --arg actor         "$GITHUB_ACTOR" \
            --arg status        '${{ inputs.status }}' \
            --arg stage         '${{ inputs.stage }}' \
            '{repo:$repo, workflow_name:$workflow_name, run_id:$run_id, run_url:$run_url, ref:$ref, sha:$sha, actor:$actor, status:$status, stage:$stage}')"
          curl -sS --fail-with-body -X POST "http://127.0.0.1:18789/hooks/ci-result" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENCLAW_GATEWAY_HOOK_TOKEN }}" \
            -d "$payload"
