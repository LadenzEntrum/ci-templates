name: Deploy (reusable)

# Reusable deploy workflow: copy a build artifact to a local directory on the self-hosted runner.
# The `production` target is gated by the GitHub Environment protection rule (required reviewer) on the CALLER repo.
#
# NOTE on GitHub semantics: environments + secrets are resolved in the CALLER repository.
# The caller must define environments `staging`/`production` and
# pass any required secrets via `secrets: inherit` (or explicitly).
# For this workflow, no secrets are required because we write to the local filesystem.

on:
  workflow_call:
    inputs:
      deploy_target:
        description: "Target environment: staging | production"
        required: true
        type: string
      target-path:
        description: "Absolute path on the host to copy the artifact into (e.g. /mnt/HettiWeb/hue-staging)"
        required: true
        type: string
      artifact-name:
        description: "Name of the artifact produced by ci.yml"
        required: false
        type: string
        default: "build"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    environment: ${{ inputs.deploy_target }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./artifact

      - name: Copy artifact to target directory
        run: |
          mkdir -p "${{ inputs.target-path }}"
          rsync -av --delete ./artifact/ "${{ inputs.target-path }}/"
